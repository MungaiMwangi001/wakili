version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     wakili
      POSTGRES_PASSWORD: wakili_secret
      POSTGRES_DB:       wakili
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakili"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wakili-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    networks:
      - wakili-net

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - wakili-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL:  postgresql://wakili:wakili_secret@db:5432/wakili
      REDIS_URL:     redis://redis:6379/0
      CHROMA_HOST:   chromadb
      CHROMA_PORT:   8000
      ALLOWED_EXTENSIONS: '["pdf","docx","txt","png","jpg","jpeg"]'
    volumes:
      - ./backend:/app 
      - uploads_data:/app/uploads
      - llm_models:/root/.cache/huggingface
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - wakili-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - wakili-net

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  uploads_data:
  llm_models:

networks:
  wakili-net:
    driver: bridge